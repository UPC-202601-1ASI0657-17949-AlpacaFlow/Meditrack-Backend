# Spring Application Name
spring.application.name=MediTrack Platform

# Server Configuration
server.port=8080
# Trust X-Forwarded-* / Forwarded from the platform load balancer (e.g. Cloud Run) so
# generated absolute URLs and OpenAPI server metadata use https when clients use https.
server.forward-headers-strategy=framework

# Spring DataSource Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/meditrack?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Spring JPA Configuration
spring.jpa.show-sql=true

# Spring Data JPA Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=com.alpacaflow.meditrackplatform.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# Application Information for Documentation
documentation.application.description=@project.description@
documentation.application.version=@project.version@

# JWT Configuration
authorization.jwt.secret=WriteHereYourSecretStringForTokenSigningCredentials
authorization.jwt.expiration.days=7

# Springdoc / Swagger UI (local): http://localhost:8080/swagger-ui/index.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

# Spring Profiles
# Set active profile to 'dev' for development (enables mock user creation endpoints)
# FOR production, REMOVE or set to 'prod' to disable mock endpoints
# spring.profiles.active=dev